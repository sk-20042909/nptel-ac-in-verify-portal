<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NPTEL Certification</title>
    <style>
        /* This section makes the image center and fill the screen */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; justify-content: center; align-items: center; background-color: #ffffff; /* Sets a clean white background */ }
        
        .certificate-frame { /* This creates a container for the image */ display: flex; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        
        img { /* This ensures the image scales perfectly without broken margins */ max-width: 100%; max-height: 95vh; /* Prevents vertical scrolling */ height: auto; width: auto; box-shadow: 0 0 25px rgba(0,0,0,0.15); /* Adds a very subtle shadow for a premium look */ border: 1px solid #e0e0e0; /* Optional: adds a tiny clean border */ }
    </style>
</head>
<body>
    
    <div class="certificate-frame">
        <img src="preview%201.jpeg" alt="NPTEL e-Certificate">
    </div>

</body>
</html>
